<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalStack Notes Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.8rem;
      color: #38bdf8;
      margin-bottom: 0.25rem;
    }

    header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      color: #38bdf8;
      margin-top: 0.5rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1.1rem;
      color: #f1f5f9;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #38bdf8;
    }

    textarea { resize: vertical; min-height: 80px; }

    button {
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #0284c7; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .note {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .note h3 {
      font-size: 1rem;
      color: #38bdf8;
      margin-bottom: 0.25rem;
    }

    .note p { color: #cbd5e1; font-size: 0.9rem; line-height: 1.5; }

    .note time {
      display: block;
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.5rem;
    }

    .empty {
      text-align: center;
      color: #64748b;
      padding: 2rem;
      font-size: 0.9rem;
    }

    .status {
      text-align: center;
      padding: 0.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .status.error { display: block; background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .status.success { display: block; background: #052e16; color: #86efac; border: 1px solid #14532d; }

    .config {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .config input { margin-bottom: 0; flex: 1; }
    .config button { white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>LocalStack Notes Demo</h1>
      <p>S3 + Lambda + API Gateway &mdash; everything local with LocalStack</p>
      <span class="badge">Colloquium Demo</span>
    </header>

    <div class="card">
      <h2>API endpoint</h2>
      <div class="config">
        <input type="text" id="apiUrl" placeholder="http://localhost:4566/restapis/{id}/dev/_user_request_">
        <button onclick="saveConfig()">Save</button>
      </div>
      <p style="font-size: 0.8rem; color: #64748b;">
        Enter the base URL without <code>/notes</code> at the end (this is what the script prints as "API").
      </p>
    </div>

    <div id="status" class="status"></div>

    <div class="card">
      <h2>New note</h2>
      <form id="noteForm" onsubmit="return createNote(event)">
        <label for="title">Title</label>
        <input type="text" id="title" placeholder="My note..." required>
        <label for="content">Content</label>
        <textarea id="content" placeholder="Enter your content here..." required></textarea>
        <button type="submit" id="submitBtn">Save note</button>
      </form>
    </div>

    <div class="card">
      <h2>Saved notes</h2>
      <button onclick="loadNotes()" style="margin-bottom: 1rem; background: #475569;">Refresh</button>
      <div id="notesList">
        <div class="empty">No notes yet. Create your first note!</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL_KEY = "localstack-demo-api-url";

    function getApiUrl() {
      return document.getElementById("apiUrl").value
        .replace(/\/+$/, "")
        .replace(/\/notes$/, "");
    }

    function saveConfig() {
      const url = getApiUrl();
      if (!url) return;
      localStorage.setItem(API_URL_KEY, url);
      showStatus("API endpoint saved!", "success");
      loadNotes();
    }

    function showStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + type;
      if (type === "success") {
        setTimeout(() => { el.className = "status"; }, 3000);
      }
    }

    async function createNote(e) {
      e.preventDefault();
      const url = getApiUrl();
      if (!url) { showStatus("Please configure the API endpoint first.", "error"); return false; }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Saving...";

      try {
        const res = await fetch(url + "/notes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: document.getElementById("title").value,
            content: document.getElementById("content").value,
          }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        document.getElementById("noteForm").reset();
        showStatus("Note saved!", "success");
        await loadNotes();
      } catch (err) {
        showStatus("Error: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Save note";
      }
      return false;
    }

    async function loadNotes() {
      const url = getApiUrl();
      if (!url) return;

      const list = document.getElementById("notesList");
      try {
        const res = await fetch(url + "/notes");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const notes = await res.json();

        if (notes.length === 0) {
          list.innerHTML = '<div class="empty">No notes yet.</div>';
          return;
        }

        list.innerHTML = notes.map(note => `
          <div class="note">
            <h3>${escapeHtml(note.title)}</h3>
            <p>${escapeHtml(note.content)}</p>
            <time>${new Date(note.createdAt).toLocaleString("en-GB")}</time>
          </div>
        `).join("");
      } catch (err) {
        list.innerHTML = '<div class="empty">Error while loading: ' + escapeHtml(err.message) + '</div>';
      }
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    // Restore saved API URL on load
    const saved = localStorage.getItem(API_URL_KEY);
    if (saved) {
      document.getElementById("apiUrl").value = saved;
      loadNotes();
    }
  </script>
</body>
</html>
